name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'

  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - dev

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install frontend dependencies
      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./frontend

      # Build frontend with environment variables
      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: https://be-fms-dev-h6fed7awcqd7cxb5.centralus-01.azurewebsites.net
          VITE_SUPER_TENANT_ID: 05642b69-8f04-44d0-b74c-27c9db4b4969
          VITE_SYSTEM_SUPER_USER_ID: 2930b04c-4b14-4540-a6fc-002093679b8b

      # Deploy to Azure Static Web Apps
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_TREE_021D4C00F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "./frontend" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist" # Built app content directory

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE_TREE_021D4C00F }}
          action: "close"
